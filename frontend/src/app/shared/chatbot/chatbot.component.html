<!-- Hidden file input -->
<input #fileInput type="file" accept=".csv,.pdf,.xlsx,.xls" style="display:none" (change)="onFileSelected($event)">

<!-- Floating trigger button -->
<button class="chat-trigger" (click)="toggle()" [class.active]="open" [title]="translate.translate('chatbot.title')">
  <svg *ngIf="!open" xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24"
    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
  <svg *ngIf="open" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
    fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="18" y1="6" x2="6" y2="18"/>
    <line x1="6" y1="6" x2="18" y2="18"/>
  </svg>
  <span class="trigger-label" *ngIf="!open">{{ translate.translate('chatbot.askData') }}</span>
</button>

<!-- Chat window -->
<div class="chat-window" [class.visible]="open">

  <!-- Header -->
  <div class="chat-header">
    <div class="chat-avatar">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <ellipse cx="12" cy="5" rx="9" ry="3"/>
        <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
        <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
      </svg>
    </div>
    <div class="chat-header-info">
      <div class="chat-title">{{ translate.translate('chatbot.dataAssistant') }}</div>
      <div class="chat-subtitle">{{ translate.translate('chatbot.connectedTo') }}</div>
    </div>
    <button class="clear-btn" (click)="clearChat()" [title]="translate.translate('chatbot.clearChat')">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6"/><path d="M14 11v6"/>
        <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
      </svg>
    </button>
  </div>

  <!-- Action buttons row -->
  <div class="action-buttons-row">
    <!-- ✨ Summarize -->
    <button class="action-btn summarize-btn" (click)="summarizeDB()" [disabled]="isBusy" [title]="translate.translate('chatbot.summarizeTitle')">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
      <span>{{ summarizing ? translate.translate('chatbot.summarizing') : translate.translate('chatbot.summarize') }}</span>
    </button>

    <!-- 📎 Upload File -->
    <button class="action-btn upload-btn" (click)="triggerFileUpload()" [disabled]="isBusy" [title]="translate.translate('chatbot.uploadTitle')">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
      </svg>
      <span>{{ uploadingFile ? translate.translate('chatbot.analyzing') : translate.translate('chatbot.uploadFile') }}</span>
    </button>
  </div>

  <!-- Messages -->
  <div class="chat-messages">
    <div *ngFor="let msg of messages" class="message-row" [class.user-row]="msg.role === 'user'">

      <!-- Bot avatar -->
      <div *ngIf="msg.role === 'bot'" class="bot-avatar">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <ellipse cx="12" cy="5" rx="9" ry="3"/>
          <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
          <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
        </svg>
      </div>

      <div class="bubble"
        [class.user-bubble]="msg.role === 'user'"
        [class.bot-bubble]="msg.role === 'bot'"
        [class.summary-bubble]="msg.tag === 'summary'"
        [class.file-bubble]="msg.tag === 'file'">

        <!-- Tag badge -->
        <div *ngIf="msg.tag === 'summary'" class="bubble-tag summary-tag">{{ translate.translate('chatbot.summaryTag') }}</div>
        <div *ngIf="msg.tag === 'file'" class="bubble-tag file-tag">{{ translate.translate('chatbot.fileTag') }}</div>

        <!-- Loading dots -->
        <div *ngIf="msg.loading" class="typing-dots">
          <span></span><span></span><span></span>
        </div>
        <!-- Message text -->
        <div *ngIf="!msg.loading" [innerHTML]="formatText(msg.text)"></div>
        <div class="msg-time">{{ msg.time }}</div>
      </div>
    </div>

    <div #messagesEnd></div>
  </div>

  <!-- Quick suggestions -->
  <div class="suggestions-row">
    <button *ngFor="let s of suggestions" class="suggestion-chip" (click)="ask(s)" [disabled]="isBusy">
      {{ s }}
    </button>
  </div>

  <!-- Input -->
  <div class="chat-input-row">
    <input
      type="text"
      [(ngModel)]="question"
      (keydown)="onKey($event)"
      [placeholder]="translate.translate('chatbot.placeholder')"
      [disabled]="isBusy"
      class="chat-input"
    />
    <button class="send-btn" (click)="ask()" [disabled]="isBusy || !question.trim()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

</div>
