<div class="dashboard-container full-width">
  <!-- Compact Header -->
  <div class="page-header fade-in" *ngIf="!error">
    <div class="page-title-row">
      <span class="page-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="9" y1="21" x2="9" y2="9"/>
        </svg>
      </span>
      <div>
        <h1>{{ reportTitle }}</h1>
        <p class="subtitle">{{ userName }}</p>
      </div>
    </div>
    <button class="btn-refresh" (click)="refreshDashboard()" [disabled]="isLoading" [title]="translate.translate('common.refresh')">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
      </svg>
    </button>
  </div>

  <!-- Error Message -->
  <div class="error-banner" *ngIf="error">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <div>
      <strong>{{ error }}</strong>
      <p>{{ translate.translate('dashboard.error') }}</p>
    </div>
  </div>

  <!-- Loading State -->
  <div class="loading-state" *ngIf="isLoading && !error">
    <div class="spinner"></div>
    <p>{{ translate.translate('dashboard.loading') }}</p>
  </div>

  <!-- Power BI Dashboard Iframe - Full Screen Centered -->
  <div class="iframe-wrapper" *ngIf="powerBIUrl && !error">
    <div class="iframe-container" id="powerbi-container">
      <!-- Blocker pour empêcher les clics sur les onglets -->
      <div class="navigation-blocker" title="Navigation désactivée"></div>
      
      <iframe 
        #powerbiFrame
        [src]="powerBIUrl" 
        (load)="onIframeLoad()"
        (error)="onIframeError()"
        frameborder="0"
        allowfullscreen
        class="powerbi-iframe"
        title="{{ reportTitle }}"
        sandbox="allow-same-origin allow-scripts allow-popups allow-forms"
      ></iframe>
    </div>
  </div>

  <!-- SDG Footer -->
  <app-sdg-footer 
    [sdgNumber]="9"
    [customDescription]="'This dashboard promotes industry innovation and infrastructure by providing data-driven insights for strategic decision-making and business intelligence.'">
  </app-sdg-footer>
</div>
