<div class="ia-assistant">

  <!-- Header -->
  <div class="ia-header fade-in">
    <div class="ia-title-row">
      <span class="ia-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2z"/>
          <circle cx="7.5" cy="14.5" r="1.5"/>
          <circle cx="16.5" cy="14.5" r="1.5"/>
        </svg>
      </span>
      <div>
        <h1>{{ translate.translate('assistant.title') }}</h1>
        <p class="ia-subtitle">{{ translate.translate('assistant.subtitle') }}</p>
      </div>
    </div>
  </div>

  <!-- Tab navigation -->
  <div class="tab-bar fade-in">
    <button
      *ngFor="let tab of tabs"
      class="tab-btn"
      [class.active]="activeTab === tab.id"
      (click)="setTab(tab.id)">
      <span class="tab-icon" [innerHTML]="tab.icon"></span>
      <span class="tab-label">{{ translate.translate('assistant.tabs.' + tab.id) }}</span>
    </button>
  </div>

  <!-- Tab content -->
  <div class="tab-content">
    <app-forecast       *ngIf="activeTab === 'forecast'"></app-forecast>
    <app-segmentation   *ngIf="activeTab === 'segmentation'"></app-segmentation>
    <app-anomaly        *ngIf="activeTab === 'anomaly'"></app-anomaly>
    <app-promotion      *ngIf="activeTab === 'promotion'"></app-promotion>
    <app-recommendations *ngIf="activeTab === 'recommendations'"></app-recommendations>
    <app-sentiment      *ngIf="activeTab === 'sentiment'"></app-sentiment>
  </div>

</div>
