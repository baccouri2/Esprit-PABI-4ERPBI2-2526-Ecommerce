[options]
# Database settings
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo

# Server settings
http_port = 8069
longpolling_port = 8072

# CRITICAL: Allow iframe embedding
x_frame_options = ALLOWALL

# Database management - Allow database creation
list_db = True
db_name = False

# Performance settings
workers = 2
max_cron_threads = 1

# Logging
log_level = info

# Admin password (master password for database operations)
admin_passwd = admin123

# Session settings
limit_time_cpu = 600
limit_time_real = 1200
